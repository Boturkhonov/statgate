apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-stable
  namespace: statgate-demo
  labels:
    app: demo
    version: stable
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo
      version: stable
  template:
    metadata:
      labels:
        app: demo
        version: stable
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: demo
          image: statgate-demo:v1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_VERSION
              value: "v1"
            - name: DATABASE_URL
              value: "postgres://demo:demo-password@postgres:5432/ordersdb?sslmode=disable"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-canary
  namespace: statgate-demo
  labels:
    app: demo
    version: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo
      version: canary
  template:
    metadata:
      labels:
        app: demo
        version: canary
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: demo
          image: statgate-demo:v2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_VERSION
              value: "v2"
            - name: DATABASE_URL
              value: "postgres://demo:demo-password@postgres:5432/ordersdb?sslmode=disable"
            - name: ERROR_RATE
              value: "0.3"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
