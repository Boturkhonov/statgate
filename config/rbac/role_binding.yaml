apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: statgate-controller-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: statgate-controller-role
subjects:
  - kind: ServiceAccount
    name: statgate-controller
    namespace: statgate-system
