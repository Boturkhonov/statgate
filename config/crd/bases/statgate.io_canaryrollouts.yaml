apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: canaryrollouts.statgate.io
spec:
  group: statgate.io
  names:
    kind: CanaryRollout
    listKind: CanaryRolloutList
    plural: canaryrollouts
    singular: canaryrollout
    shortNames:
      - cr
      - canary
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Weight
          type: integer
          jsonPath: .status.currentWeight
        - name: Step
          type: integer
          jsonPath: .status.currentStep
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: CanaryRollout is the Schema for the canaryrollouts API.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - targetRef
                - stableServiceRef
                - canaryServiceRef
                - virtualServiceRef
                - steps
              properties:
                targetRef:
                  type: string
                  description: Name of the canary Deployment in the same namespace.
                stableServiceRef:
                  type: string
                  description: Name of the Service routing to stable pods.
                canaryServiceRef:
                  type: string
                  description: Name of the Service routing to canary pods.
                virtualServiceRef:
                  type: string
                  description: Name of the Istio VirtualService to patch weights on.
                steps:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                      - weight
                      - pauseSeconds
                    properties:
                      weight:
                        type: integer
                        format: int32
                        minimum: 0
                        maximum: 100
                      pauseSeconds:
                        type: integer
                        format: int32
                        minimum: 0
                paused:
                  type: boolean
                  default: false
                abort:
                  type: boolean
                  default: false
                prometheusURL:
                  type: string
                  description: Base URL of the Prometheus instance to query for metric checks. If empty, all Metrics checks are skipped.
                metrics:
                  type: array
                  description: Optional list of Prometheus health gates evaluated after each step pause before advancing.
                  items:
                    type: object
                    required:
                      - name
                      - query
                      - threshold
                      - operator
                    properties:
                      name:
                        type: string
                        description: Human-readable label for this check.
                      query:
                        type: string
                        description: PromQL instant query evaluated against prometheusURL.
                      threshold:
                        type: number
                        format: double
                        description: Numeric value to compare the query result against.
                      operator:
                        type: string
                        description: "Comparison operator. Allowed values: >, <, >=, <=, ==, !="
                        pattern: '^(>|<|>=|<=|==|!=)$'
                      interval:
                        type: string
                        description: Informational interval hint (e.g. 1m). Embed directly in the query string.
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Running
                    - Paused
                    - Promoted
                    - Aborted
                    - Failed
                currentStep:
                  type: integer
                  format: int32
                currentWeight:
                  type: integer
                  format: int32
                lastTransitionTime:
                  type: string
                  format: date-time
                message:
                  type: string
