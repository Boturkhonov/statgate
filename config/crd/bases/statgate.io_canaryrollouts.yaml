apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: canaryrollouts.statgate.io
spec:
  group: statgate.io
  names:
    kind: CanaryRollout
    listKind: CanaryRolloutList
    plural: canaryrollouts
    singular: canaryrollout
    shortNames:
      - cr
      - canary
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Weight
          type: integer
          jsonPath: .status.currentWeight
        - name: Step
          type: integer
          jsonPath: .status.currentStep
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: CanaryRollout is the Schema for the canaryrollouts API.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - targetRef
                - stableServiceRef
                - canaryServiceRef
                - virtualServiceRef
                - steps
              properties:
                targetRef:
                  type: string
                  description: Name of the canary Deployment in the same namespace.
                stableServiceRef:
                  type: string
                  description: Name of the Service routing to stable pods.
                canaryServiceRef:
                  type: string
                  description: Name of the Service routing to canary pods.
                virtualServiceRef:
                  type: string
                  description: Name of the Istio VirtualService to patch weights on.
                steps:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                      - weight
                      - pauseSeconds
                    properties:
                      weight:
                        type: integer
                        format: int32
                        minimum: 0
                        maximum: 100
                      pauseSeconds:
                        type: integer
                        format: int32
                        minimum: 0
                paused:
                  type: boolean
                  default: false
                abort:
                  type: boolean
                  default: false
                prometheusURL:
                  type: string
                  description: Base URL of the Prometheus instance to query. If empty, SPRT analysis is skipped.
                analysis:
                  type: object
                  description: SPRT-based statistical analysis configuration.
                  required:
                    - alpha
                    - beta
                    - metrics
                  properties:
                    alpha:
                      type: number
                      format: double
                      minimum: 0
                      maximum: 1
                      description: Maximum probability of a false rollback (Type I error).
                    beta:
                      type: number
                      format: double
                      minimum: 0
                      maximum: 1
                      description: Maximum probability of missing a real degradation (Type II error).
                    analysisIntervalSeconds:
                      type: integer
                      format: int32
                      minimum: 1
                      description: How frequently the SPRT runs during the pause window. Defaults to 10.
                    metrics:
                      type: array
                      minItems: 1
                      description: List of SPRT health gates using the Bernoulli model.
                      items:
                        type: object
                        required:
                          - name
                          - canaryTotalQuery
                          - canaryFailureQuery
                          - stableTotalQuery
                          - stableFailureQuery
                          - delta
                        properties:
                          name:
                            type: string
                            description: Human-readable label for this metric.
                          canaryTotalQuery:
                            type: string
                            description: PromQL query returning cumulative total request counter for canary.
                          canaryFailureQuery:
                            type: string
                            description: PromQL query returning cumulative failure counter for canary.
                          stableTotalQuery:
                            type: string
                            description: PromQL query returning cumulative total request counter for stable.
                          stableFailureQuery:
                            type: string
                            description: PromQL query returning cumulative failure counter for stable.
                          delta:
                            type: number
                            format: double
                            description: Minimum detectable effect size. Alternative hypothesis is p1 = p0 + delta.
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Running
                    - Paused
                    - Promoted
                    - Aborted
                    - Failed
                currentStep:
                  type: integer
                  format: int32
                currentWeight:
                  type: integer
                  format: int32
                lastTransitionTime:
                  type: string
                  format: date-time
                message:
                  type: string
                analysisState:
                  type: array
                  description: Per-metric SPRT accumulator state. Reset when advancing to next step.
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      logLikelihood:
                        type: number
                        format: double
                      observations:
                        type: integer
                        format: int64
                      failures:
                        type: integer
                        format: int64
                      baselineRate:
                        type: number
                        format: double
                      lastCanaryTotal:
                        type: number
                        format: double
                      lastCanaryFailure:
                        type: number
                        format: double
                      decision:
                        type: string
                        enum:
                          - pending
                          - promote
                          - rollback
