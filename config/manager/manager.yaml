apiVersion: v1
kind: Namespace
metadata:
  name: statgate-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: statgate-controller-manager
  namespace: statgate-system
  labels:
    app: statgate-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: statgate-controller
  template:
    metadata:
      labels:
        app: statgate-controller
    spec:
      serviceAccountName: statgate-controller
      containers:
        - name: manager
          image: statgate-controller:latest
          args:
            - --leader-elect
          ports:
            - containerPort: 8080
              name: metrics
            - containerPort: 8081
              name: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 64Mi
